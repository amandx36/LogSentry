services:
  db:
    image: postgres:17-alpine
    container_name: logsentry-DB
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: logsentry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - LogsentryNet

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: logsentry-server
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    networks:
      - LogsentryNet

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: logsentry-worker
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "9091:9091"
    volumes:
      - ./logs:/app/logs
      - ./internal/data:/app/internal/data
    networks:
      - LogsentryNet

  prometheus:
    image: prom/prometheus:latest
    container_name: Prometheus
    restart: unless-stopped
    depends_on:
      - server
      - worker
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - LogsentryNet

  grafana:
    image: grafana/grafana-oss:latest
    container_name: Grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - LogsentryNet

networks:
  LogsentryNet:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
  grafana-data: